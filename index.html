<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genz Talk - Unique</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #202c33; --wa-sent: #005c4b; --wa-received: #202c33; --wa-text: #e9edef; --wa-dim: #8696a0; --wa-green: #00a884; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #111b21; color: var(--wa-text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--wa-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--wa-panel); padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        
        .app-container { width: 100%; max-width: 1200px; height: 100vh; display: flex; background: var(--wa-bg); }
        .sidebar { width: 300px; border-right: 1px solid #222e35; display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--wa-bg); }
        
        .error-msg { color: #ff4b4b; font-size: 13px; margin-top: 10px; display: none; }
        .loading { color: var(--wa-green); font-size: 13px; margin-top: 10px; display: none; }
        
        .contact-item { padding: 15px; border-bottom: 1px solid #222e35; cursor: pointer; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 8px; max-width: 70%; font-size: 14px; }
        .sent { background: var(--wa-sent); align-self: flex-end; }
        .received { background: var(--wa-received); align-self: flex-start; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color: var(--wa-green);">Genz Talk</h1>
        <p style="color: var(--wa-dim); margin-bottom: 20px;">Pick a unique username</p>
        <input type="text" id="usernameInput" placeholder="Username" style="width:100%; padding:12px; border-radius:8px; border:none; background:#2a3942; color:white; outline:none;">
        <div id="loginError" class="error-msg">That name is already taken!</div>
        <div id="loginLoading" class="loading">Checking availability...</div>
        <button onclick="checkAndLogin()" style="width:100%; padding:12px; background:var(--wa-green); color:white; border:none; border-radius:8px; margin-top:15px; font-weight:bold; cursor:pointer;">Join Chat</button>
    </div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div style="padding: 15px; background: var(--wa-panel); font-weight: bold;">Contacts</div>
        <div style="padding: 10px;"><input type="text" id="addName" placeholder="Add friend..." onkeypress="if(event.key==='Enter') addContact()" style="width:100%; padding:8px; border-radius:8px; border:none; background:var(--wa-panel); color:white;"></div>
        <div id="contactList"></div>
    </div>
    <div class="main-chat" id="chatView" style="display:none;">
        <div id="activeTitle" style="padding: 15px; background: var(--wa-panel); font-weight: bold;"></div>
        <div id="msgBox" class="msg-box"></div>
        <div style="padding: 15px; background: var(--wa-panel); display: flex; gap: 10px;">
            <input type="text" id="msgInput" placeholder="Type a message" style="flex:1; padding:10px; border-radius:20px; border:none; background:#2a3942; color:white; outline:none;">
            <button onclick="sendMsg()" style="background:var(--wa-green); border:none; color:white; padding:10px 20px; border-radius:20px; cursor:pointer;">Send</button>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = '-AH-2A.nFhslQ:tmnJR6FrDPv2cg53XRnEinFRH8vELv0IksQpIeZzrlg';
    const ably = new Ably.Realtime(ABLY_KEY);
    const globalChannel = ably.channels.get('global-presence'); // Special channel to track names
    
    let me = localStorage.getItem('genz_user') || "";
    let contacts = JSON.parse(localStorage.getItem('genz_contacts') || "[]");
    let activeUser = null;

    window.onload = () => {
        if (me) {
            // Re-verify presence even if name is in localStorage
            globalChannel.presence.enterClient(me, () => {
                document.getElementById('login-screen').style.display = 'none';
                initInbox();
                renderContacts();
            });
        }
    };

    async function checkAndLogin() {
        const name = document.getElementById('usernameInput').value.trim().toLowerCase();
        if (!name) return;

        const errorDiv = document.getElementById('loginError');
        const loadingDiv = document.getElementById('loginLoading');
        
        errorDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        // Check if anyone is currently using this name
        globalChannel.presence.get((err, members) => {
            const isTaken = members.some(m => m.clientId === name);
            
            if (isTaken) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
            } else {
                // Name is free! Join the presence list
                globalChannel.presence.enterClient(name, () => {
                    localStorage.setItem('genz_user', name);
                    location.reload();
                });
            }
        });
    }

    function logout() {
        globalChannel.presence.leaveClient(me, () => {
            localStorage.clear();
            location.reload();
        });
    }

    function addContact() {
        const c = document.getElementById('addName').value.trim().toLowerCase();
        if (c && c !== me && !contacts.includes(c)) { 
            contacts.push(c); 
            localStorage.setItem('genz_contacts', JSON.stringify(contacts)); 
            renderContacts(); 
        }
        document.getElementById('addName').value = "";
    }

    function renderContacts() {
        const list = document.getElementById('contactList');
        list.innerHTML = "";
        contacts.forEach(c => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `<strong>${c}</strong>`;
            div.onclick = () => openChat(c);
            list.appendChild(div);
        });
    }

    function initInbox() {
        ably.channels.get(`inbox-${me}`).subscribe('msg', (m) => {
            if (activeUser === m.data.from) renderMsg(m.data.text, 'received');
        });
    }

    function openChat(name) {
        activeUser = name;
        document.getElementById('chatView').style.display = 'flex';
        document.getElementById('activeTitle').innerText = name;
        document.getElementById('msgBox').innerHTML = "";
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        ably.channels.get(`inbox-${activeUser}`).publish('msg', { from: me, text: input.value });
        renderMsg(input.value, 'sent');
        input.value = "";
    }

    function renderMsg(txt, type) {
        const box = document.getElementById('msgBox');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
