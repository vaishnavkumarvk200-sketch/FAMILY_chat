<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genz Talk - Private</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b141a; color: #e9edef; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #login-screen { position: fixed; inset: 0; background: #0b141a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: #202c33; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 350px; }

        .app { width: 100%; max-width: 500px; height: 95vh; background: #0b141a; display: flex; border-radius: 10px; border: 1px solid #222e35; overflow: hidden; }
        
        /* Sidebar/Contacts */
        .sidebar { width: 35%; background: #111b21; border-right: 1px solid #222e35; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #202c33; font-weight: bold; font-size: 14px; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #222e35; cursor: pointer; font-size: 14px; }
        .contact-item:hover { background: #2a3942; }
        .contact-item.active { background: #2a3942; border-left: 4px solid #00a884; }

        /* Main Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .chat-header { padding: 12px; background: #202c33; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { background: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        
        .input-bar { padding: 10px; background: #202c33; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        button { background: #00a884; border: none; color: white; padding: 8px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Genz Talk</h2>
        <input type="text" id="usernameInput" placeholder="Your Unique Username" style="width: 100%; margin: 15px 0; padding: 10px; border-radius: 5px; border:none;">
        <button onclick="login()" style="width: 100%; border-radius: 5px;">Set Username</button>
    </div>
</div>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">Contacts</div>
        <div style="padding: 10px; border-bottom: 1px solid #222e35;">
            <input type="text" id="newContact" placeholder="Add friend name..." style="font-size: 12px; padding: 5px;">
            <button onclick="addContact()" style="padding: 5px 10px; font-size: 10px; margin-top: 5px;">Add</button>
        </div>
        <div id="contactList" class="contact-list"></div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <span id="chatTitle">Select a contact</span>
            <span style="font-size: 10px; color: #8696a0; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Logout</span>
        </div>
        <div id="messages"></div>
        <div class="input-bar" id="inputContainer" style="display: none;">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendPrivateMsg()">➤</button>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = '-AH-2A.nFhslQ:tmnJR6FrDPv2cg53XRnEinFRH8vELv0IksQpIeZzrlg'; 
    const ably = new Ably.Realtime(ABLY_KEY);
    let myUsername = localStorage.getItem('savedName') || "";
    let activeChat = null;
    let contacts = JSON.parse(localStorage.getItem('contacts') || "[]");

    window.onload = () => {
        if (myUsername) {
            document.getElementById('login-screen').style.display = 'none';
            initInbox();
            renderContacts();
        }
    };

    function login() {
        const name = document.getElementById('usernameInput').value.trim().toLowerCase();
        if (name) {
            myUsername = name;
            localStorage.setItem('savedName', name);
            location.reload();
        }
    }

    // LISTENS TO YOUR PERSONAL CHANNEL
    function initInbox() {
        const inbox = ably.channels.get(`inbox-${myUsername}`);
        inbox.subscribe('private-msg', (msg) => {
            if (activeChat === msg.data.from) {
                renderMessage(msg.data.text, 'received');
            } else {
                if (!contacts.includes(msg.data.from)) {
                    contacts.push(msg.data.from);
                    localStorage.setItem('contacts', JSON.stringify(contacts));
                    renderContacts();
                }
                alert(`New message from ${msg.data.from}!`);
            }
        });
    }

    function addContact() {
        const name = document.getElementById('newContact').value.trim().toLowerCase();
        if (name && name !== myUsername && !contacts.includes(name)) {
            contacts.push(name);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            renderContacts();
            document.getElementById('newContact').value = "";
        }
    }

    function renderContacts() {
        const list = document.getElementById('contactList');
        list.innerHTML = "";
        contacts.forEach(c => {
            const div = document.createElement('div');
            div.className = `contact-item ${activeChat === c ? 'active' : ''}`;
            div.innerText = c;
            div.onclick = () => startChat(c);
            list.appendChild(div);
        });
    }

    function startChat(name) {
        activeChat = name;
        document.getElementById('chatTitle').innerText = name;
        document.getElementById('messages').innerHTML = "";
        document.getElementById('inputContainer').style.display = 'flex';
        renderContacts();
    }

    function sendPrivateMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeChat) return;

        // SEND TO THE FRIEND'S INBOX
        const friendInbox = ably.channels.get(`inbox-${activeChat}`);
        friendInbox.publish('private-msg', {
            from: myUsername,
            text: input.value
        });

        renderMessage(input.value, 'sent');
        input.value = "";
    }

    function renderMessage(text, type) {
        const chat = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('msgInput').addEventListener("keypress", (e) => { if (e.key === "Enter") sendPrivateMsg(); });
</script>
</body>
</html>
